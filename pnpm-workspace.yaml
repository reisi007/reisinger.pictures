packages:
  - apps/*
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  exifreader: true
  sharp: true

minimumReleaseAgeExclude:
  - '@astrojs/markdown-satteri@0.3.4'
  - '@astrojs/mdx@7.0.3'
  - astro@7.1.2

overrides:
  '@astrojs/internal-helpers>js-yaml': 4.3.0
  concurrently>shell-quote: 1.10.0

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - exifreader
  - sharp

packages:
  - apps/*
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  exifreader: true
  sharp: true

minimumReleaseAgeExclude:
  - '@astrojs/markdown-satteri@0.3.4'
  - '@astrojs/mdx@7.0.3'
  - astro@7.0.8

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - exifreader
  - sharp
